tag:
  - chain_of_thought
task: asdiv_llada_mini
dataset_path: EleutherAI/asdiv
output_type: generate_until
validation_split: validation
test_split: validation
doc_to_text: "Question: {{body if body is defined}} {{question}}\nLet's think step by step\nAnswer:"
doc_to_target: "{{answer.split(' (')[0] if answer is defined else target}}"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: false
    regexes_to_ignore:
      - ","
      - "\\$"
      - "(?s).*#### "
      - "\\.$"
      - "(?<=\\d)\\.0+(?!\\d)"
generation_kwargs:
  until:
    - "Question:"
    - "</s>"
    - "<|im_end|>"
  do_sample: false
  temperature: 0.0
repeats: 1
num_fewshot: 0
filter_list:
  - name: "strict-match"
    filter:
      - function: "regex"
        regex_pattern: "#### (\\-?[0-9\\.\\,]+)"
      - function: "take_first"
  - name: "flexible-extract"
    filter:
      - function: "regex"
        group_select: -1
        regex_pattern: "(-?[$0-9.,]{2,})|(-?[0-9]+)"
      - function: "take_first"

metadata:
  version: 1.0